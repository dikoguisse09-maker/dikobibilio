{% extends "base.html" %}

{% block content %}

<table class="table">
  <thead>
    <tr>
      <th scope="#id">#</th>
      <th scope="prenom">First</th>
      <th scope="nom">Last</th>
      <th scope="nationalite">Handle</th>
    </tr>
  </thead>
  <tbody>
  {%for a in person %}
    <tr>
      <th scope="row">{{a.id}}</th>
      <td>{{a.prenom}}</td>
      <td>{{a.nom}}</td>
      <td>{{a.nationalite}}</td>
    </tr>
    {%endfor%} 
  </tbody>
</table>

{% endblock content %}
